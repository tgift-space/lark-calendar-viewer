<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Calendar Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F7F8FA; color: #1a1a2e; padding: 16px; font-size: 13px; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.title { font-size: 15px; font-weight: 600; color: #1a1a2e; display: flex; align-items: center; gap: 8px; }
.title-icon { width: 28px; height: 28px; background: #1A3C6E; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }

.view-toggle { display: flex; gap: 4px; background: #eef0f4; border-radius: 8px; padding: 3px; }
.vbtn { padding: 5px 14px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; background: transparent; color: #6b7280; font-weight: 500; transition: all .15s; }
.vbtn.active { background: white; color: #1A3C6E; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.week-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #dde1ea; background: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.nav-btn:hover { border-color: #1A3C6E; color: #1A3C6E; }
.week-label { font-size: 13px; font-weight: 500; color: #1a1a2e; min-width: 180px; text-align: center; }

input[type="date"], select { padding: 6px 10px; border: 1px solid #dde1ea; border-radius: 8px; font-size: 12px; background: white; color: #1a1a2e; outline: none; cursor: pointer; }
input[type="date"]:focus, select:focus { border-color: #1A3C6E; }

.btn-check { padding: 6px 16px; background: #1A3C6E; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; }
.btn-check:hover { background: #2E6DB4; }
.btn-check:disabled { background: #aab4c8; cursor: not-allowed; }

.member-section { margin-bottom: 14px; }
.member-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.member-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid #dde1ea; background: white; cursor: pointer; font-size: 12px; color: #4b5563; transition: all .15s; user-select: none; }
.chip:hover { border-color: #1A3C6E; color: #1A3C6E; }
.chip.selected { background: #EAF2FB; border-color: #2E6DB4; color: #1A3C6E; font-weight: 500; }
.chip-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }

/* Daily timeline */
.timeline-card { background: white; border: 1px solid #dde1ea; border-radius: 12px; overflow: hidden; }
.timeline-header { padding: 12px 16px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; justify-content: space-between; }
.timeline-date { font-size: 13px; font-weight: 600; color: #1a1a2e; }
.legend { display: flex; gap: 12px; font-size: 11px; color: #6b7280; align-items: center; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
.timeline-body { padding: 16px; }
.ruler { display: grid; grid-template-columns: 80px 1fr; gap: 0; margin-bottom: 8px; }
.ruler-hours { grid-column: 2; display: flex; position: relative; height: 20px; }
.ruler-hour { flex: 1; font-size: 10px; color: #9ca3af; text-align: left; padding-left: 2px; border-left: 1px solid #f0f2f5; }
.member-row { display: grid; grid-template-columns: 80px 1fr; align-items: center; margin-bottom: 10px; gap: 0; }
.member-name { font-size: 12px; color: #374151; font-weight: 500; padding-right: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timeline-bar { position: relative; height: 28px; background: #f0fdf4; border-radius: 6px; overflow: hidden; border: 1px solid #d1fae5; }
.busy-block { position: absolute; top: 0; bottom: 0; background: #EF4444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: 500; overflow: hidden; white-space: nowrap; padding: 0 4px; min-width: 4px; }
.free-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; color: #16a34a; font-weight: 500; pointer-events: none; }

/* Weekly grid */
.week-card { background: white; border: 1px solid #dde1ea; border-radius: 12px; overflow: hidden; }
.week-header-row { display: grid; border-bottom: 1px solid #f0f2f5; }
.week-header-cell { padding: 10px 8px; font-size: 12px; font-weight: 600; text-align: center; color: #1a1a2e; border-right: 1px solid #f0f2f5; }
.week-header-cell:last-child { border-right: none; }
.week-header-cell.today-col { background: #EAF2FB; color: #1A3C6E; }
.week-header-cell.name-col { text-align: left; color: #6b7280; font-weight: 500; }
.week-body { }
.week-member-row { display: grid; border-bottom: 1px solid #f9fafb; }
.week-member-row:last-child { border-bottom: none; }
.week-cell { padding: 8px; border-right: 1px solid #f0f2f5; min-height: 52px; }
.week-cell:last-child { border-right: none; }
.week-cell.name-cell { display: flex; align-items: center; gap: 6px; padding: 8px 10px; }
.week-cell.today-col { background: #fafcff; }
.busy-pill { display: inline-block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 4px; font-size: 10px; padding: 2px 5px; margin: 1px 0; white-space: nowrap; }
.free-pill { display: inline-block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 4px; font-size: 10px; padding: 2px 5px; }
.loading-cell { color: #9ca3af; font-size: 11px; }

.loading { text-align: center; padding: 32px 16px; color: #6b7280; font-size: 13px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #dde1ea; border-top-color: #1A3C6E; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #dc2626; margin: 8px 0; }
.status-empty { text-align: center; padding: 32px 16px; color: #9ca3af; font-size: 13px; }
.status-empty .emoji { font-size: 28px; display: block; margin-bottom: 8px; }

.summary-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.summary-card { flex: 1; min-width: 120px; background: #f9fafb; border: 1px solid #f0f2f5; border-radius: 8px; padding: 10px 12px; }
.summary-card .sc-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.summary-card .sc-val { font-size: 14px; font-weight: 600; color: #1a1a2e; }
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <div class="title-icon">📅</div>
    Team Calendar Viewer
  </div>
  <div class="view-toggle">
    <button class="vbtn active" id="btn-day" onclick="setView('day')">รายวัน</button>
    <button class="vbtn" id="btn-week" onclick="setView('week')">รายสัปดาห์</button>
  </div>
</div>

<div style="display:none">
  <input type="text" id="appId" value="cli_aab61623ea385ed0">
  <input type="password" id="appSecret" value="hIjacIViS3pDT6QnrHRGbj62EHKQLTcl">
  <input type="text" id="memberList" value="SOM:ou_ad295de94f2a6e71c52abff4d223c4e9, GIFT:ou_05f788222b794bcf92e0c0479495544d">
</div>

<div class="member-section">
  <div class="member-label">เลือกสมาชิกที่อยากดู</div>
  <div class="member-chips" id="memberChips">
    <span style="color:#9ca3af;font-size:12px">กำลังโหลด...</span>
  </div>
</div>

<!-- Day controls -->
<div id="day-controls" class="controls">
  <input type="date" id="datePicker">
  <button class="btn-check" onclick="checkAvailability()">ดูตารางว่าง</button>
</div>

<!-- Week controls -->
<div id="week-controls" class="controls" style="display:none">
  <div class="week-nav">
    <button class="nav-btn" onclick="moveWeek(-1)">←</button>
    <span class="week-label" id="weekLabel">—</span>
    <button class="nav-btn" onclick="moveWeek(1)">→</button>
  </div>
  <button class="btn-check" onclick="checkWeek()">ดูตารางว่าง</button>
</div>

<!-- Daily view -->
<div id="day-view">
  <div class="timeline-card">
    <div class="timeline-header">
      <span class="timeline-date" id="timelineDate">—</span>
      <div class="legend">
        <span><span class="legend-dot" style="background:#EF4444"></span>ติดประชุม</span>
        <span><span class="legend-dot" style="background:#bbf7d0;border:1px solid #86efac"></span>ว่าง</span>
      </div>
    </div>
    <div class="timeline-body" id="timelineBody">
      <div class="status-empty"><span class="emoji">🗓</span>เลือกสมาชิกและวันที่ แล้วกด "ดูตารางว่าง"</div>
    </div>
  </div>
</div>

<!-- Weekly view -->
<div id="week-view" style="display:none">
  <div class="week-card" id="weekCard">
    <div class="status-empty"><span class="emoji">🗓</span>เลือกสมาชิกแล้วกด "ดูตารางว่าง"</div>
  </div>
</div>

<div id="debugBox" style="display:none;margin-top:12px;background:#1e1e2e;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:#cdd6f4;max-height:200px;overflow-y:auto"></div>

<script>
const WORK_START = 9, WORK_END = 18, HOURS = WORK_END - WORK_START;
const COLORS = ['#1A3C6E','#2E6DB4','#0F6E56','#854F0B','#993556'];
const DAY_TH = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const DAY_SHORT = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];

let members = [], selectedIds = [], tokenCache = { value: null, exp: 0 };
let currentView = 'day', weekOffset = 0;

document.getElementById('datePicker').value = new Date().toISOString().slice(0,10);
updateWeekLabel();
initMembersAuto();

function setView(v) {
  currentView = v;
  document.getElementById('btn-day').classList.toggle('active', v==='day');
  document.getElementById('btn-week').classList.toggle('active', v==='week');
  document.getElementById('day-controls').style.display = v==='day' ? 'flex' : 'none';
  document.getElementById('week-controls').style.display = v==='week' ? 'flex' : 'none';
  document.getElementById('day-view').style.display = v==='day' ? 'block' : 'none';
  document.getElementById('week-view').style.display = v==='week' ? 'block' : 'none';
}

function getMonday(offset=0) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1) + offset*7;
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDates(offset=0) {
  const mon = getMonday(offset);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon);
    d.setDate(d.getDate()+i);
    return d;
  });
}

function updateWeekLabel() {
  const days = getWeekDates(weekOffset);
  const fmt = d => `${d.getDate()}/${d.getMonth()+1}`;
  document.getElementById('weekLabel').textContent = `${fmt(days[0])} – ${fmt(days[4])}/${days[4].getFullYear()+543}`;
}

function moveWeek(d) {
  weekOffset += d;
  updateWeekLabel();
}

function dateStr(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function initMembersAuto() {
  const raw = document.getElementById('memberList').value.trim();
  if (!raw) return;
  members = raw.split(',').map((s,i) => {
    const [name, id] = s.trim().split(':');
    return { name: name?.trim()||'คนที่'+(i+1), id: id?.trim(), color: COLORS[i%COLORS.length] };
  }).filter(m=>m.id);
  selectedIds = members.map(m=>m.id);
  renderChips();
}

function renderChips() {
  const wrap = document.getElementById('memberChips');
  if (!members.length) { wrap.innerHTML='<span style="color:#9ca3af;font-size:12px">ยังไม่มีสมาชิก</span>'; return; }
  wrap.innerHTML = members.map(m=>`
    <div class="chip selected" id="chip_${m.id}" onclick="toggleMember('${m.id}')">
      <div class="chip-avatar" style="background:${m.color}">${m.name.charAt(0)}</div>${m.name}
    </div>`).join('');
}

function toggleMember(id) {
  selectedIds.includes(id) ? selectedIds=selectedIds.filter(x=>x!==id) : selectedIds.push(id);
  document.getElementById('chip_'+id).classList.toggle('selected', selectedIds.includes(id));
}

async function getToken() {
  if (tokenCache.value && Date.now()<tokenCache.exp) return tokenCache.value;
  const appId=document.getElementById('appId').value.trim();
  const appSecret=document.getElementById('appSecret').value.trim();
  if (!appId||!appSecret) throw new Error('กรอก App ID และ App Secret ก่อนครับ');
  const res=await fetch('https://holy-wildflower-f7e2.gratchadaporn.workers.dev/open-apis/auth/v3/tenant_access_token/internal',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({app_id:appId,app_secret:appSecret})
  });
  const data=await res.json();
  if (data.code!==0) throw new Error('ขอ token ไม่สำเร็จ: '+data.msg);
  tokenCache={value:data.tenant_access_token, exp:Date.now()+(data.expire-300)*1000};
  return tokenCache.value;
}

async function getFreebusy(token, userId, date) {
  const res=await fetch('https://holy-wildflower-f7e2.gratchadaporn.workers.dev/open-apis/calendar/v4/freebusy/list',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({time_min:date+'T02:00:00Z', time_max:date+'T12:00:00Z', user_id:userId})
  });
  const data=await res.json();
  if (data.code!==0) throw new Error(data.msg);
  return dedupBusy(data.data?.freebusy_list||[]);
}

function toLocalHour(utcStr) {
  const d=new Date(utcStr);
  return d.getUTCHours()+7+d.getUTCMinutes()/60;
}

function debugLog(msg) {
  const box=document.getElementById('debugBox');
  if(!box) return;
  box.style.display='block';
  box.innerHTML+=`<div>${msg}</div>`;
}

function dedupBusy(busy) {
  const seen = new Set();
  return busy.filter(b => {
    const key = b.start_time + '_' + b.end_time;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function pct(h) { return Math.max(0,Math.min(100,(h-WORK_START)/HOURS*100)); }

function formatHour(h) {
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ===== DAILY VIEW =====
async function checkAvailability() {
  const date=document.getElementById('datePicker').value;
  if (!date) return alert('เลือกวันที่ก่อนครับ');
  if (!selectedIds.length) return alert('เลือกสมาชิกก่อนครับ');
  const body=document.getElementById('timelineBody');
  const titleEl=document.getElementById('timelineDate');
  body.innerHTML=`<div class="loading"><div class="spinner"></div><br>กำลังดึงข้อมูล...</div>`;
  const d=new Date(date);
  titleEl.textContent=`วัน${DAY_TH[d.getDay()]}ที่ ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
  try {
    const token=await getToken();
    const selected=members.filter(m=>selectedIds.includes(m.id));
    const rows=[];
    for (const m of selected) { rows.push({member:m, busy:await getFreebusy(token,m.id,date)}); }
    renderTimeline(body, rows);
  } catch(e) { body.innerHTML=`<div class="error-box">❌ ${e.message}</div>`; }
}

function renderTimeline(body, rows) {
  const hours=Array.from({length:HOURS+1},(_,i)=>WORK_START+i);
  let html=`<div class="ruler"><div></div><div class="ruler-hours">${hours.map(h=>`<div class="ruler-hour">${h}:00</div>`).join('')}</div></div>`;
  let totalBusy=0, totalFree=0;
  for (const {member,busy} of rows) {
    const blocks=busy.map(b=>{ const s=toLocalHour(b.start_time),e=toLocalHour(b.end_time); totalBusy+=e-s; return {s,e,left:pct(s),width:pct(e)-pct(s)}; });
    totalFree+=Math.max(0,HOURS-blocks.reduce((a,b)=>a+b.e-b.s,0));
    html+=`<div class="member-row">
      <div class="member-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${member.color};margin-right:6px"></span>${member.name}</div>
      <div class="timeline-bar">
        ${blocks.length===0?'<div class="free-label">ว่างทั้งวัน ✓</div>':blocks.map(b=>`<div class="busy-block" style="left:${b.left.toFixed(1)}%;width:${Math.max(b.width,0.5).toFixed(1)}%">${b.width>5?formatHour(b.s)+'–'+formatHour(b.e):''}</div>`).join('')}
      </div></div>`;
  }
  const freeSlots=findFreeSlots(rows);
  html+=`<div class="summary-row">
    <div class="summary-card"><div class="sc-label">ช่วงที่ทุกคนว่าง</div><div class="sc-val">${freeSlots.length?freeSlots[0]:'ไม่มี'}</div></div>
    <div class="summary-card"><div class="sc-label">รวมเวลาว่าง</div><div class="sc-val">${Math.round(totalFree)} ชม.</div></div>
    <div class="summary-card"><div class="sc-label">รวมเวลาติดประชุม</div><div class="sc-val">${Math.round(totalBusy)} ชม.</div></div>
  </div>`;
  if (freeSlots.length>1) html+=`<div style="margin-top:10px;font-size:12px;color:#374151"><strong>ช่วงที่ทุกคนว่างทั้งหมด:</strong> ${freeSlots.join(' · ')}</div>`;
  body.innerHTML=html;
}

function findFreeSlots(rows) {
  const slots=[];
  for (let h=WORK_START;h<WORK_END;h++) {
    const allFree=rows.every(({busy})=>!busy.some(b=>{ const s=toLocalHour(b.start_time),e=toLocalHour(b.end_time); return s<h+1&&e>h; }));
    if (allFree) {
      const label=`${String(h).padStart(2,'0')}:00–${String(h+1).padStart(2,'0')}:00`;
      if (slots.length&&slots[slots.length-1].endsWith(`${String(h).padStart(2,'0')}:00`)) slots[slots.length-1]=slots[slots.length-1].split('–')[0]+`–${String(h+1).padStart(2,'0')}:00`;
      else slots.push(label);
    }
  }
  return slots;
}

// ===== WEEKLY VIEW =====
async function checkWeek() {
  if (!selectedIds.length) return alert('เลือกสมาชิกก่อนครับ');
  const days=getWeekDates(weekOffset);
  const selected=members.filter(m=>selectedIds.includes(m.id));
  const today=dateStr(new Date());
  const cols=selected.length+1;
  const colWidth=`${100/cols}%`;

  document.getElementById('weekCard').innerHTML=`<div class="loading"><div class="spinner"></div><br>กำลังดึงข้อมูล...</div>`;

  try {
    const token=await getToken();
    // fetch all at once
    const allData={};
    await Promise.all(selected.flatMap(m=>days.map(async day=>{
      const ds=dateStr(day);
      const key=`${m.id}_${ds}`;
      const _r=await getFreebusy(token,m.id,ds);
      allData[key]=_r;
      debugLog(`[${m.name}] ${ds} → ${JSON.stringify(_r.map(b=>b.start_time.slice(11,16)+'–'+b.end_time.slice(11,16)))}`);
    })));

    // build grid
    const gridCols=`grid-template-columns: 80px repeat(5, 1fr)`;
    let html=`<div class="week-header-row" style="${gridCols}">
      <div class="week-header-cell name-col">สมาชิก</div>
      ${days.map(d=>{
        const ds=dateStr(d);
        const isToday=ds===today;
        return `<div class="week-header-cell${isToday?' today-col':''}">
          <div>${DAY_SHORT[d.getDay()]}</div>
          <div style="font-size:11px;font-weight:400;color:${isToday?'#1A3C6E':'#6b7280'}">${d.getDate()}/${d.getMonth()+1}</div>
        </div>`;
      }).join('')}
    </div>`;

    for (const m of selected) {
      html+=`<div class="week-member-row" style="${gridCols}">
        <div class="week-cell name-cell">
          <div class="chip-avatar" style="background:${m.color};width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0">${m.name.charAt(0)}</div>
          <span style="font-size:12px;font-weight:500;color:#374151">${m.name}</span>
        </div>
        ${days.map(d=>{
          const ds=dateStr(d);
          const isToday=ds===today;
          const busy=allData[`${m.id}_${ds}`]||[];
          let cellContent='';
          if (busy.length===0) {
            cellContent=`<div class="free-pill">ว่างทั้งวัน</div>`;
          } else {
            cellContent=busy.map(b=>{
              const s=toLocalHour(b.start_time), e=toLocalHour(b.end_time);
              return `<div class="busy-pill">${formatHour(s)}–${formatHour(e)}</div>`;
            }).join('');
          }
          return `<div class="week-cell${isToday?' today-col':''}">${cellContent}</div>`;
        }).join('')}
      </div>`;
    }

    // free slots per day
    html+=`<div class="week-member-row" style="${gridCols};background:#f9fafb">
      <div class="week-cell name-cell" style="font-size:11px;color:#6b7280;font-weight:500">ทุกคนว่าง</div>
      ${days.map(d=>{
        const ds=dateStr(d);
        const isToday=ds===today;
        const rows=selected.map(m=>({busy:allData[`${m.id}_${ds}`]||[]}));
        const slots=findFreeSlots(rows);
        return `<div class="week-cell${isToday?' today-col':''}" style="font-size:11px;color:#16a34a">${slots.length?slots.slice(0,2).join('<br>')+'<br>':'<span style="color:#9ca3af">ไม่มี</span>'}</div>`;
      }).join('')}
    </div>`;

    document.getElementById('weekCard').innerHTML=html;
  } catch(e) {
    document.getElementById('weekCard').innerHTML=`<div class="error-box" style="margin:16px">❌ ${e.message}</div>`;
  }
}
</script>
</body>
</html>
